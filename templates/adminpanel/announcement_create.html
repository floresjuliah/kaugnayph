{% extends "admin_base.html" %}

{% block admin_title %}Create Announcement{% endblock %}

{% block admin_content %}

<div class="ann-page">

    <div class="ann-header">
        <h1>Create Announcement</h1>
    </div>

    <div class="ann-table-card">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>Title</label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>Content</label>

                <textarea
                    name="content"
                    class="form-control"
                    rows="6"
                    required
                ></textarea>

            </div>

            <div class="mb-3">

                <label>
                    <input type="checkbox" name="send_sms">
                    Send as urgent SMS announcement
                </label>

            </div>

            <button type="submit" class="btn btn-primary">
                Create Announcement
            </button>

            <a href="{% url 'announcements' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
