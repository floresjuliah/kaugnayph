{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password – KaugnayPH</title>

    <link rel="stylesheet"
          href="{% static 'css/admin.css' %}">
</head>

<body class="admin-login-page">

<div class="admin-login-card">

    <h1 class="login-logo">
        Kaugnay<span>PH</span>
    </h1>

    <p class="login-subtitle">
        Forgot Password
    </p>

    {% if messages %}
        {% for msg in messages %}
            <div class="login-alert">
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label for="username">
            Username
        </label>

        <input type="text"
               id="username"
               name="username"
               placeholder="Enter username"
               required
               autofocus>

        <button type="submit">
            Send OTP
        </button>

        <div class="forgot-password" style="margin-top:20px;">
            <a href="{% url 'admin_login' %}">
                Back to Login
            </a>
        </div>

    </form>

</div>

</body>
</html>
