<div
    id="positionConfirmModal"
    class="position-confirm-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="positionConfirmTitle"
>
    <div class="position-confirm-card">

        <div class="position-confirm-icon">
            <i
                id="positionConfirmIcon"
                class="fa-solid fa-triangle-exclamation"
            ></i>
        </div>

        <h3
            id="positionConfirmTitle"
            class="position-confirm-title"
        >
            Confirm Action
        </h3>

        <p
            id="positionConfirmMessage"
            class="position-confirm-message"
        >
            Are you sure you want to continue?
        </p>

        <div class="position-confirm-actions">
            <button
                type="button"
                id="positionCancelButton"
                class="btn btn-outline-secondary"
            >
                Cancel
            </button>

            <button
                type="button"
                id="positionConfirmButton"
                class="admin-primary-btn border-0"
            >
                Continue
            </button>
        </div>

    </div>
</div>
