{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reset Password – KaugnayPH</title>

    <link rel="stylesheet"
          href="{% static 'css/admin.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="admin-login-page">

<div class="admin-login-card">

    <h1 class="login-logo">
        Kaugnay<span>PH</span>
    </h1>

    <p class="login-subtitle">
        Reset Password
    </p>

    {% if messages %}
        {% for msg in messages %}
            <div class="login-alert">
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label for="new_password">
            New Password
        </label>

        <div class="password-wrapper">
            <input type="password"
                   id="new_password"
                   name="new_password"
                   placeholder="........"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword('new_password', 'newPasswordIcon')">
                <i class="fa-regular fa-eye" id="newPasswordIcon"></i>
            </span>
        </div>

        <label for="confirm_password">
            Confirm Password
        </label>

        <div class="password-wrapper">
            <input type="password"
                   id="confirm_password"
                   name="confirm_password"
                   placeholder="........"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword('confirm_password', 'confirmPasswordIcon')">
                <i class="fa-regular fa-eye" id="confirmPasswordIcon"></i>
            </span>
        </div>

        <button type="submit">
            Reset Password
        </button>

    </form>

</div>

<script>
function togglePassword(inputId, iconId) {

    const passwordInput = document.getElementById(inputId);
    const icon = document.getElementById(iconId);

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
