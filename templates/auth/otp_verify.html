{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width:420px">
  <h3 class="mb-4">OTP Verification</h3>
  <p>An OTP has been sent to your registered mobile number.</p>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label>Enter OTP</label>
      <input type="text" name="otp_code" class="form-control"
             maxlength="6" inputmode="numeric" autofocus required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Verify OTP</button>
  </form>

  <div class="mt-3 text-center">
    <a href="{% url 'resend_otp' %}">Resend OTP</a>
  </div>
</div>
{% endblock %}
