{% extends "admin_base.html" %}

{% block admin_title %}Edit Announcement{% endblock %}

{% block admin_content %}

<div class="ann-page">

    <div class="ann-header">
        <h1>Edit Announcement</h1>
    </div>

    <div class="ann-table-card">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Title</label>
                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ announcement.title }}"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Content</label>
                <textarea
                    name="content"
                    class="form-control"
                    rows="6"
                    required
                >{{ announcement.content }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                Save Changes
            </button>

            <a href="{% url 'admin_announcement_detail' announcement.announcement_id %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>

    </div>

</div>

{% endblock %}
