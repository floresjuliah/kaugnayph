{% extends "admin_base.html" %}
{% load static %}

{% block admin_title %}Add Position{% endblock %}

{% block admin_content %}

<link rel="stylesheet" href="{% static 'css/admin_standard.css' %}">

<div class="admin-page">

    <div class="admin-page-header">
        <div>
            <h1 class="admin-page-title">Add Position</h1>
        </div>
    </div>

    <div class="admin-table-card">
        <div class="p-4">

            <form
                method="POST"
                data-position-confirm
                data-confirm-title="Create New Position"
                data-confirm-message="This position will be created without any assigned module permissions. You can configure them afterwards."
                data-confirm-button="Create Position"
                data-confirm-variant="primary"
                data-confirm-icon="fa-solid fa-plus"
            >
                {% csrf_token %}

                <div class="mb-3">
                    <label for="position_name" class="form-label">
                        Position Name <span class="text-danger">*</span>
                    </label>

                    <input
                        type="text"
                        id="position_name"
                        name="position_name"
                        class="form-control"
                        maxlength="100"
                        value="{{ position_name|default:'' }}"
                        placeholder="e.g., Barangay Health Worker"
                        required
                    >

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a
                        href="{% url 'access_control' %}"
                        class="btn btn-outline-secondary"
                    >
                        Cancel
                    </a>

                    <button type="submit" class="admin-primary-btn border-0">
                        <i class="fa-solid fa-plus"></i>
                        Create Position
                    </button>
                </div>
            </form>

        </div>
    </div>

</div>

<link rel="stylesheet" href="{% static 'css/position_confirm.css' %}">
{% include "adminpanel/position_confirm_modal.html" %}
<script src="{% static 'js/position_confirm.js' %}"></script>

{% endblock %}
