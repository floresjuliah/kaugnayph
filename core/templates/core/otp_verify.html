<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
</head>
<body>

<h1>OTP Verification</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="otp_code" placeholder="Enter OTP">
    <br><br>

    <button type="submit">Verify</button>
</form>

{% for message in messages %}
    <p>{{ message }}</p>
{% endfor %}

</body>
</html>
