{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reset Password – KaugnayPH</title>

    <link rel="stylesheet"
          href="{% static 'css/admin.css' %}">
</head>

<body class="admin-login-page">

<div class="admin-login-card">

    <h1 class="login-logo">
        Kaugnay<span>PH</span>
    </h1>

    <p class="login-subtitle">
        Reset Password
    </p>

    {% if messages %}
        {% for msg in messages %}
            <div class="login-alert">
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label for="new_password">
            New Password
        </label>

        <div class="password-wrapper">
            <input type="password"
                   id="new_password"
                   name="new_password"
                   placeholder="........"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword('new_password')">
                👁
            </span>
        </div>

        <label for="confirm_password">
            Confirm Password
        </label>

        <div class="password-wrapper">
            <input type="password"
                   id="confirm_password"
                   name="confirm_password"
                   placeholder="........"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword('confirm_password')">
                👁
            </span>
        </div>

        <button type="submit">
            Reset Password
        </button>

    </form>

</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
