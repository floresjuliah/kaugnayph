{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personnel First Login</title>

    <link rel="stylesheet" href="{% static 'css/admin.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="first-login-page">

<div class="first-login-card">

    <h1>Kaugnay<span>PH</span></h1>
    <p class="login-subtitle">Personnel Login</p>

    <p class="login-note">
        New Log-In detected.<br>
        Change your credentials immediately.
    </p>

    {% if messages %}
        {% for message in messages %}
            <div class="auth-alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username"
               value="{{ user.username|default:'' }}"
               placeholder="John Addams" required>

        <small>ex. “Firstname” + “Lastname”</small>

        <label>Email</label>
        <input type="email" name="email"
               value="{{ user.email|default:'' }}"
               placeholder="abc123@email.com" required>

        <label>Barangay Position <em>(Katungkulan sa Barangay)</em></label>
        <select name="position_id" required>
            <option value="">Select Position (Piliin ang Katungkulan)</option>
            {% for pos in positions %}
                <option value="{{ pos.positionid }}"
                    {% if user.position and user.position.positionid == pos.positionid %}
                        selected
                    {% endif %}>
                    {{ pos.name }}
                </option>
            {% endfor %}
        </select>

        <label>Contact Number</label>
        <input type="text" name="contact_no"
               value="{{ user.contactno|default:'' }}"
               placeholder="09XX XXX XXX" maxlength="11" required>

        <label for="new_password">New Password</label>
        <div class="password-wrapper">
            <input type="password"
                   id="new_password"
                   name="new_password"
                   placeholder="........"
                   minlength="8"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword('new_password', 'newPasswordIcon')">
                <i class="fa-regular fa-eye" id="newPasswordIcon"></i>
            </span>
        </div>

        <label for="confirm_password">Confirm Password</label>
        <div class="password-wrapper">
            <input type="password"
                   id="confirm_password"
                   name="confirm_password"
                   placeholder="........"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword('confirm_password', 'confirmPasswordIcon')">
                <i class="fa-regular fa-eye" id="confirmPasswordIcon"></i>
            </span>
        </div>

        <input type="hidden" name="firstname" value="{{ user.firstname|default:'User' }}">
        <input type="hidden" name="lastname" value="{{ user.lastname|default:'User' }}">

        <button type="submit">Confirm account</button>
    </form>

</div>

<script>
function togglePassword(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const icon = document.getElementById(iconId);

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
