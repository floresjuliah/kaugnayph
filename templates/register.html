<!-- register.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KaugnayPH – Create Account</title>

  <!-- CONNECT CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- POPPINS FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <p class="welcome-text">Welcome to</p>

    <div class="logo-circle">
      <img src="images/kaugnayPH.png" alt="placeholder" />
    </div>

    <p class="brand-name">KAUGNAYPH</p>

    <p class="brand-desc">
      A Web-Based Barangay Communication and Resident
      Concern Management System with SMS Notification
    </p>

    <nav class="nav-links">
      <a href="#">Home</a>
      <span>|</span>
      <a href="#">About Us</a>
    </nav>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="form-card">

      <h1>Create your Account</h1>
      <p class="subtitle">Get started by creating your new Account</p>

      <div class="form-group">
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" />
      </div>

      <div class="form-group">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" />
      </div>

      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <p class="hint">e.g. 09952638048</p>
        <input type="tel" id="mobile" name="mobile" />
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" name="address" />
      </div>

      <div class="form-group">
        <label for="password">Password:</label>

        <div class="pw-wrapper">
          <input type="password" id="password" name="password" />

          <button type="button" class="pw-toggle" onclick="togglePassword()">
            👁
          </button>
        </div>
      </div>

      <div class="sms-row">
        <input type="checkbox" id="smsConsent" name="smsConsent" />

        <label for="smsConsent">
          Do you want to receive SMS text from Kaugnay PH?
        </label>
      </div>

      <button class="btn-create" onclick="handleRegister()">
        Create Account
      </button>

      <p class="signin-link">
        Already have an Account?
        <a href="login.html">Sign In</a>
      </p>

    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function handleRegister() {
      alert('Account Created!');
    }
  </script>

</body>
</html>
