{% extends 'base.html' %}
{% load static %}

{% block content %}

  <!-- ── HERO ── -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <h1 data-en="About Us" data-tl="Tungkol sa Amin">About Us</h1>

    <div class="ann-hero-divider"></div>

    <p class="hero-description" data-en="Promoting unity, service, and good governance."
       data-tl="Nagtataguyod ng pagkakaisa, serbisyo, at mabuting pamamahala.">
      Promoting unity, service, and good governance.
    </p>
  </div>
</section>

<!-- ── WHAT WE DO ── -->
<section class="about-whatwedo">
  <div class="about-whatwedo__container">

    <h2 class="about-section-title" data-en="What we do" data-tl="Ano ang aming ginagawa">What we do</h2>
    <div class="about-section-divider"></div>

    <div class="about-whatwedo__row">

      <div class="about-whatwedo__image">
        <img src="{% static 'images/BarangayOfficial.png' %}" alt="Barangay 761 Officials">
      </div>

      <div class="about-whatwedo__text">
        <p style="white-space: pre-line;">{{ what_we_do.content_en }}</p>
      </div>

    </div>

  </div>
</section>

<!-- ── MISSION & VISION ── -->
<section class="about-mv">
  <div class="about-mv__container">

    <h2 class="about-section-title" data-en="Mission &amp; Vision" data-tl="Misyon at Bisyon">Mission &amp; Vision</h2>
    <div class="about-section-divider"></div>

    <div class="about-mv__grid">

      <div class="about-mv__card">
        <h3 data-en="Mission" data-tl="Misyon">Mission</h3>
        <div class="about-mv__card-divider"></div>
        <p style="white-space: pre-line;">{{ mission.content_en }}</p>
      </div>

      <div class="about-mv__card">
        <h3 data-en="Vision" data-tl="Bisyon">Vision</h3>
        <div class="about-mv__card-divider"></div>
        <p style="white-space: pre-line;">{{ vision.content_en }}</p>
      </div>

    </div>

  </div>
</section>

{% endblock %}
