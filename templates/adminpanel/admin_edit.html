{% extends "admin_base.html" %}
{% block admin_title %}Edit Admin{% endblock %}

{% block admin_content %}

<div class="admins-page">


<div class="admins-header">
    <h1 class="admins-title">Edit Admin</h1>

    <a href="{% url 'admins_list' %}" class="add-admin-btn">
        Back to Admins
    </a>
</div>

<div class="admins-card" style="padding: 28px;">

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>First Name *</label>
            <input
                type="text"
                name="firstname"
                class="form-control"
                value="{{ admin_user.firstname }}"
                required
            >
        </div>

        <div class="mb-3">
            <label>Last Name *</label>
            <input
                type="text"
                name="lastname"
                class="form-control"
                value="{{ admin_user.lastname }}"
                required
            >
        </div>

        <div class="mb-3">
            <label>Email *</label>
            <input
                type="email"
                name="email"
                class="form-control"
                value="{{ admin_user.email }}"
                required
            >
        </div>

        <div class="mb-3">
            <label>Contact No. *</label>
            <input
                type="text"
                name="contact_no"
                class="form-control"
                value="{{ admin_user.contactno }}"
                required
            >
        </div>

        <div class="mb-3">
            <label>Position *</label>
            <select
                name="position_id"
                class="form-select"
                required
            >
                <option value="">-- Select Position --</option>

                {% for pos in positions %}
                    <option value="{{ pos.positionid }}"
                        {% if admin_user.position and admin_user.position.positionid == pos.positionid %}
                            selected
                        {% endif %}
                    >
                        {{ pos.name }}
                    </option>
                {% endfor %}
            </select>

            <small class="text-muted">
                System permissions will automatically be updated based on the selected position.
            </small>
        </div>

        <button type="submit" class="btn btn-primary">
            Save Changes
        </button>

        <a href="{% url 'admins_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>


</div>

{% endblock %}
