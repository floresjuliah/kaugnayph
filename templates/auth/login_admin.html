{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login – KaugnayPH</title>

    <link rel="stylesheet"
          href="{% static 'css/admin.css' %}">
</head>

<body class="admin-login-page">

<div class="admin-login-card">

    <h1 class="login-logo">
        Kaugnay<span>PH</span>
    </h1>

    <p class="login-subtitle">
        Admin Login
    </p>

    {% if messages %}
        {% for msg in messages %}
            <div class="login-alert">
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label for="username">
            Username
        </label>

        <input type="text"
               id="username"
               name="username"
               placeholder="Enter username"
               required
               autofocus>

        <label for="password">
            Password
        </label>

        <div class="password-wrapper">

            <input type="password"
                   id="password"
                   name="password"
                   placeholder="........"
                   required>

            <span class="toggle-password"
                  onclick="togglePassword()">
                👁
            </span>

        </div>

        <div class="forgot-password">
            <a href="#">
                Forgot Password?
            </a>
        </div>

        <button type="submit">
            Login to Dashboard
        </button>

    </form>

</div>

<script>
function togglePassword() {

    const passwordInput =
        document.getElementById("password");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
    }
    else {
        passwordInput.type = "password";
    }
}
</script>

</body>
</html>
