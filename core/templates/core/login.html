<!DOCTYPE html>
<html>
<head>
    <title>KaugnayPH Login</title>
</head>
<body>

<h1>Login Page</h1>

<form method="POST">
    {% csrf_token %}

    <label>Username</label>
    <input type="text" name="username">

    <br><br>

    <label>Password</label>
    <input type="password" name="password">

    <br><br>

    <button type="submit">Login</button>
</form>

{% if messages %}
    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}
{% endif %}

</body>
</html>
